<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="AetherMind - A powerful personal knowledge graph and local AI assistant." />
    <meta property="og:title" content="AetherMind" />
    <meta property="og:description" content="A powerful personal knowledge graph and local AI assistant." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>AetherMind</title>
    <script>
      (function() {
        const theme = localStorage.getItem('aethermind-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'custom') {
          try {
            const colors = JSON.parse(localStorage.getItem('aethermind-custom-themes') || '{}');
            for (const [key, val] of Object.entries(colors)) {
              if (val) {
                const cssVar = '--' + key.replace(/([A-Z])/g, '-$1').toLowerCase();
                document.documentElement.style.setProperty(cssVar, val);
              }
            }
          } catch (e) {
            console.error("Failed to load custom theme", e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root" style="width:100vw;height:100vh;overflow:hidden;background:#06071a"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
